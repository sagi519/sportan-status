<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sportan booking status</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    body {
      margin: 0;
      background: #f6f8fa;
      color: #1f2328;
    }
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .muted {
      color: #656d76;
    }
    .card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      margin: 16px 0;
      padding: 16px;
      box-shadow: 0 1px 2px rgb(31 35 40 / 6%);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }
    .badge {
      border-radius: 999px;
      display: inline-block;
      font-weight: 600;
      padding: 4px 10px;
    }
    .available {
      background: #dafbe1;
      color: #116329;
    }
    .not_open_yet {
      background: #fff8c5;
      color: #7d4e00;
    }
    .unavailable {
      background: #ffebe9;
      color: #82071e;
    }
    a.button {
      background: #0969da;
      border-radius: 8px;
      color: #fff;
      display: inline-block;
      font-weight: 600;
      padding: 10px 14px;
      text-decoration: none;
    }
    ul {
      padding-left: 20px;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #0d1117;
        color: #e6edf3;
      }
      .card {
        background: #161b22;
        border-color: #30363d;
      }
      .muted {
        color: #8b949e;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="row">
      <div>
        <h1>Sportan booking status</h1>
        <div id="updated" class="muted">Loading status...</div>
      </div>
      <a class="button" href="https://github.com/sagi519/sportan-booker/actions/workflows/sportan-status.yml">Refresh in GitHub</a>
    </div>

    <section class="card">
      <h2>Upcoming bookings</h2>
      <div id="upcoming">Loading...</div>
    </section>

    <section class="card">
      <h2>Requested slots</h2>
      <div id="requests">Loading...</div>
    </section>

    <section class="card">
      <h2>Last refresh run</h2>
      <div id="run" class="muted">Loading...</div>
    </section>
  </main>

  <script>
    const statusText = {
      available: "Available",
      not_open_yet: "Not open yet",
      unavailable: "Unavailable"
    };

    function text(value, fallback = "") {
      return value === null || value === undefined || value === "" ? fallback : String(value);
    }

    function renderUpcoming(upcoming) {
      const root = document.getElementById("upcoming");
      if (!upcoming.items || upcoming.items.length === 0) {
        root.innerHTML = `<p class="muted">${text(upcoming.message, "No upcoming bookings")}</p>`;
        return;
      }
      root.innerHTML = `<ul>${upcoming.items.map(item => `
        <li>
          <strong>${text(item.date)} ${text(item.startTime)}-${text(item.endTime)}</strong>
          ${text(item.location) ? ` - ${text(item.location)}` : ""}
          ${text(item.description) ? `<div class="muted">${text(item.description)}</div>` : ""}
        </li>
      `).join("")}</ul>`;
    }

    function renderRequests(requests) {
      const root = document.getElementById("requests");
      if (!requests || requests.length === 0) {
        root.innerHTML = `<p class="muted">No requested slots configured for this status refresh.</p>`;
        return;
      }
      root.innerHTML = requests.map(request => {
        const status = text(request.status, "unavailable");
        const priority = (request.courts || []).join(", ");
        const available = (request.available || []).join(" | ");
        return `
          <div class="card">
            <div class="row">
              <strong>${text(request.startTime)} - courts ${priority}</strong>
              <span class="badge ${status}">${statusText[status] || status}</span>
            </div>
            ${request.selectedCourt ? `<p>Best match: <strong>${text(request.selectedCourt)}</strong> (${text(request.actionText)})</p>` : ""}
            ${available ? `<p class="muted">Available now: ${available}</p>` : ""}
          </div>
        `;
      }).join("");
    }

    function renderRun(run) {
      const root = document.getElementById("run");
      if (run && run.url) {
        root.innerHTML = `<a href="${run.url}">Open GitHub Actions run</a>`;
      } else {
        root.textContent = "Run link unavailable outside GitHub Actions.";
      }
    }

    async function loadStatus() {
      const response = await fetch(`status.json?ts=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Could not load status.json: ${response.status}`);
      }
      const status = await response.json();
      document.getElementById("updated").textContent =
        `Last updated: ${text(status.updatedAt)} (${text(status.timezone)})`;
      renderUpcoming(status.upcoming || { items: [] });
      renderRequests(status.requests || []);
      renderRun(status.run || {});
    }

    loadStatus().catch(error => {
      document.getElementById("updated").textContent = error.message;
      document.getElementById("upcoming").textContent = "Status is not available yet.";
      document.getElementById("requests").textContent = "Status is not available yet.";
      document.getElementById("run").textContent = "Status is not available yet.";
    });

    setInterval(loadStatus, 60000);
  </script>
</body>
</html>
