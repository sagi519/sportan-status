<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sportan booking status</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    body {
      margin: 0;
      background: #f6f8fa;
      color: #1f2328;
    }
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .muted {
      color: #656d76;
    }
    .card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      margin: 16px 0;
      padding: 16px;
      box-shadow: 0 1px 2px rgb(31 35 40 / 6%);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }
    .badge {
      border-radius: 999px;
      display: inline-block;
      font-weight: 600;
      padding: 4px 10px;
    }
    .available {
      background: #dafbe1;
      color: #116329;
    }
    .not_open_yet {
      background: #fff8c5;
      color: #7d4e00;
    }
    .unavailable {
      background: #ffebe9;
      color: #82071e;
    }
    .success, .completed {
      background: #dafbe1;
      color: #116329;
    }
    .failure, .timed_out, .cancelled {
      background: #ffebe9;
      color: #82071e;
    }
    .in_progress, .queued, .neutral {
      background: #ddf4ff;
      color: #0969da;
    }
    a.button {
      background: #0969da;
      border-radius: 8px;
      color: #fff;
      display: inline-block;
      font-weight: 600;
      padding: 10px 14px;
      text-decoration: none;
    }
    ul {
      padding-left: 20px;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #0d1117;
        color: #e6edf3;
      }
      .card {
        background: #161b22;
        border-color: #30363d;
      }
      .muted {
        color: #8b949e;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="row">
      <div>
        <h1>Sportan booking status</h1>
        <div id="updated" class="muted">Loading status...</div>
      </div>
      <a class="button" href="https://github.com/sagi519/sportan-booker/actions/workflows/sportan-status.yml">Refresh in GitHub</a>
    </div>

    <section class="card">
      <h2>Already booked slots</h2>
      <div id="upcoming">Loading...</div>
    </section>

    <section class="card">
      <h2>Future requests</h2>
      <div id="requests">Loading...</div>
    </section>

    <section class="card">
      <h2>Automation history</h2>
      <div id="history">Loading...</div>
    </section>
  </main>

  <script>
    const statusText = {
      available: "Available",
      not_open_yet: "Not open yet",
      unavailable: "Unavailable"
    };

    function text(value, fallback = "") {
      return value === null || value === undefined || value === "" ? fallback : String(value);
    }

    function escapeHtml(value) {
      return text(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function badge(value, fallback = "neutral") {
      const normalized = text(value, fallback).toLowerCase();
      return `<span class="badge ${escapeHtml(normalized)}">${escapeHtml(value || fallback)}</span>`;
    }

    function renderUpcoming(upcoming) {
      const root = document.getElementById("upcoming");
      if (!upcoming.items || upcoming.items.length === 0) {
        root.innerHTML = `<p class="muted">${escapeHtml(text(upcoming.message, "No upcoming bookings"))}</p>`;
        return;
      }
      root.innerHTML = `<ul>${upcoming.items.map(item => `
        <li>
          <strong>${escapeHtml(item.date)} ${escapeHtml(item.startTime)}-${escapeHtml(item.endTime)}</strong>
          ${text(item.location) ? ` - ${escapeHtml(item.location)}` : ""}
          ${text(item.description) ? `<div class="muted">${escapeHtml(item.description)}</div>` : ""}
        </li>
      `).join("")}</ul>`;
    }

    function renderRequests(requests) {
      const root = document.getElementById("requests");
      if (!requests || requests.length === 0) {
        root.innerHTML = `<p class="muted">No future requests configured.</p>`;
        return;
      }
      root.innerHTML = requests.map(request => {
        const status = text(request.status, "unavailable");
        const priority = (request.courts || []).join(", ");
        const available = (request.available || []).join(" | ");
        const title = text(request.label, `${text(request.startTime)} - courts ${priority}`);
        const selectedCourt = text(request.selectedCourt);
        let selectionLine = "";
        if (selectedCourt && status === "not_open_yet") {
          selectionLine = `<p>Will try when booking opens: <strong>${escapeHtml(selectedCourt)}</strong></p>`;
        } else if (selectedCourt) {
          selectionLine = `<p>Bookable now: <strong>${escapeHtml(selectedCourt)}</strong> (${escapeHtml(request.actionText)})</p>`;
        }
        const availabilityLine = available && status !== "not_open_yet"
          ? `<p class="muted">Other currently available courts: ${escapeHtml(available)}</p>`
          : "";
        return `
          <div class="card">
            <div class="row">
              <strong>${escapeHtml(title)}</strong>
              <span class="badge ${escapeHtml(status)}">${escapeHtml(statusText[status] || status)}</span>
            </div>
            <p class="muted">
              ${escapeHtml(text(request.kind, "recurring"))}
              · target ${escapeHtml(request.targetDate)}
              · ${escapeHtml(request.startTime)}
              · courts ${escapeHtml(priority)}
            </p>
            ${selectionLine}
            ${availabilityLine}
          </div>
        `;
      }).join("");
    }

    function runState(run) {
      return run.conclusion || run.status || "unknown";
    }

    function renderRunList(title, runs) {
      if (!runs || runs.length === 0) {
        return `<h3>${escapeHtml(title)}</h3><p class="muted">No runs found.</p>`;
      }
      return `
        <h3>${escapeHtml(title)}</h3>
        <ul>${runs.map(run => `
          <li>
            <div class="row">
              <span>
                <strong>#${escapeHtml(run.number)}</strong>
                ${run.url ? `<a href="${escapeHtml(run.url)}">${escapeHtml(run.workflowName || "workflow run")}</a>` : escapeHtml(run.workflowName || "workflow run")}
              </span>
              ${badge(runState(run))}
            </div>
            <div class="muted">
              ${escapeHtml(run.event)} · created ${escapeHtml(run.createdAt)} · updated ${escapeHtml(run.updatedAt)}
            </div>
          </li>
        `).join("")}</ul>
      `;
    }

    function renderHistory(workflowRuns) {
      const root = document.getElementById("history");
      root.innerHTML = renderRunList("Booking runs", workflowRuns.booking || []);
    }

    async function loadStatus() {
      const response = await fetch(`status.json?ts=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Could not load status.json: ${response.status}`);
      }
      const status = await response.json();
      document.getElementById("updated").textContent =
        `Last updated: ${text(status.updatedAt)} (${text(status.timezone)})`;
      renderUpcoming(status.upcoming || { items: [] });
      renderRequests(status.requests || []);
      renderHistory(status.workflowRuns || { booking: [] });
    }

    loadStatus().catch(error => {
      document.getElementById("updated").textContent = error.message;
      document.getElementById("upcoming").textContent = "Status is not available yet.";
      document.getElementById("requests").textContent = "Status is not available yet.";
      document.getElementById("history").textContent = "Status is not available yet.";
    });

    setInterval(loadStatus, 60000);
  </script>
</body>
</html>
